<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ELLIOT GROUP OF COMPANIES</title>
    <meta name="description" content="Innovation. Luxury. Future." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;600;800&family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['Montserrat', 'sans-serif'],
              serif: ['Playfair Display', 'serif'],
            },
            colors: {
              navy: {
                DEFAULT: '#050B2E', // Primary Background
                light: '#0A1445',   // Secondary Dark
                lighter: '#1C245A', // Divider
                deep: '#020515',    // Darker shade for contrast
              },
              gold: {
                DEFAULT: '#D4AF37', // Gold Accent
                hover: '#F2C94C',
                dim: '#8F7320',
              },
              silver: {
                DEFAULT: '#E6E8F0', // Text Light
                dim: '#949AB0',     // Muted text
              }
            }
          }
        }
      }
    </script>
    <style>
      html {
        scroll-behavior: smooth;
      }
      body {
        background-color: #050B2E;
        color: #E6E8F0;
      }
      .gold-gradient-text {
        background: linear-gradient(to right, #D4AF37, #F2C94C, #D4AF37);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-size: 200% auto;
        animation: shine 4s linear infinite;
      }
      @keyframes shine {
        to {
          background-position: 200% center;
        }
      }
      .glass-panel {
        background: rgba(10, 20, 69, 0.4); /* Navy Light with opacity */
        backdrop-filter: blur(12px);
        border: 1px solid rgba(28, 36, 90, 0.6); /* Navy Lighter border */
      }
      /* Custom Scrollbar for chat */
      .custom-scrollbar::-webkit-scrollbar {
        width: 6px;
      }
      .custom-scrollbar::-webkit-scrollbar-track {
        background: rgba(5, 11, 46, 0.5);
      }
      .custom-scrollbar::-webkit-scrollbar-thumb {
        background: #1C245A;
        border-radius: 3px;
      }
      .custom-scrollbar::-webkit-scrollbar-thumb:hover {
        background: #D4AF37;
      }
    </style>
  <script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.40.0",

    "react": "https://esm.sh/react@^19.2.4",
    "lucide-react": "https://esm.sh/lucide-react@^0.563.0",
    "react-dom/": "https://esm.sh/react-dom@^19.2.4/"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>

    <div id="root"></div>

</body>
</html>
